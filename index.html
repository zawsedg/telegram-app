<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SiriusTech</title>

<style>
body {
margin:0;
font-family: Arial;
background:#0b0f1a;
color:white;
text-align:center;
}

header {
font-size:32px;
padding:20px;
color:#00f0ff;
}

input {
padding:12px;
width:80%;
max-width:350px;
border-radius:10px;
border:none;
margin:15px;
font-size:16px;
}

#products {
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
}

.item {
background:#111;
padding:15px;
border-radius:10px;
width:320px;
cursor:pointer;
box-shadow:0 0 10px #00f0ff33;
}

.item:hover {
transform:scale(1.02);
}

.in { color:#00ff90; }
.out { color:#ff4040; }

button {
padding:12px 20px;
border:none;
border-radius:10px;
background:#00f0ff;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<header>SiriusTech</header>

<input placeholder="Поиск..." oninput="search(this.value)">

<div id="products"></div>

<script>

let data = [];

// 🔴 ВСТАВЬ СВОЮ ССЫЛКУ CSV
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTzzPZY3u78bCNtoJwAfRnDFKsLT2RiD5F4xxTx1Rn1Ycfx_XaY81ffIX5jGJEWoek5zc8MjX0SmjCx/pub?output=csv";

fetch(url)
.then(res => res.text())
.then(text => {

let rows = text.split("\n").slice(1);

rows.forEach(r => {

if(!r) return;

// поддержка , и ;
let cols = r.includes(";") ? r.split(";") : r.split(",");

let name = cols[0];
let price = cols[1];
let stock = cols[2];

if(!name) return;

data.push({
name: name.trim(),
price: Math.round((parseFloat(price) || 0) * 1.08),
stock: stock ? stock.trim() : "Есть"
});
});

render(data);

});

function render(list){
let html = "";

list.forEach(item => {
html += `
<div class="item" onclick="openItem('${item.name.replace(/'/g,"")}')">
<b>${item.name}</b><br>
${item.price.toLocaleString()} ₽
</div>`;
});

document.getElementById("products").innerHTML = html;
}

function search(q){
q = q.toLowerCase();
let filtered = data.filter(x => x.name.toLowerCase().includes(q));
render(filtered);
}

function openItem(name){

let item = data.find(x => x.name === name);

let statusClass = item.stock.toLowerCase().includes("нет") ? "out" : "in";

let text = encodeURIComponent(`Здравствуйте, хочу купить:\n${item.name}\nЦена: ${item.price}₽`);

document.getElementById("products").innerHTML = `
<button onclick="render(data)">⬅ Назад</button>

<h2>${item.name}</h2>

<p><b>${item.price.toLocaleString()} ₽</b></p>

<p class="${statusClass}">${item.stock}</p>

<a href="https://t.me/mismailz?text=${text}" target="_blank">
<button>Купить</button>
</a>
`;
}

</script>

</body>
</html>
