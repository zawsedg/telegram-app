<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Категории</title>

<style>
body { background:#0f0f0f; color:white; font-family:Arial; padding:20px; }
button { width:100%; padding:15px; margin:5px 0; border:none; border-radius:10px; background:#1f1f1f; color:white; }
.item { background:#1a1a1a; padding:10px; margin:5px 0; border-radius:10px; }
.category { display:none; }
</style>
<script>
let data = [
{category:"Смартфоны", name:"iPhone 15", price:100000},
{category:"Смартфоны", name:"Samsung S25", price:80000},
{category:"Пылесосы", name:"Dyson V15", price:45000}
];

function showMenu(){
let categories = [...new Set(data.map(x=>x.category))];
let html = "";

categories.forEach(cat=>{
html += `<button onclick="openCat('${cat}')">${cat}</button>`;
});

document.getElementById("menu").innerHTML = html;
}

function openCat(cat){
let items = data.filter(x=>x.category==cat);
let html = `<button onclick="back()">⬅ Назад</button>`;

items.forEach(i=>{
html += `<div class="item">${i.name} — ${i.price}р</div>`;
});

document.getElementById("content").innerHTML = html;
document.getElementById("menu").style.display="none";
}

function back(){
document.getElementById("menu").style.display="block";
document.getElementById("content").innerHTML="";
}

showMenu();
</script>

</head>

<body>

<h1>Категории</h1>

<div id="menu"></div>
<div id="content"></div>

</body>
</html>
