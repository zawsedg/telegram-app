<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SiriusTech</title>

<style>
body {
margin:0;
font-family: Arial;
background: linear-gradient(135deg,#0b0f1a,#1c1f2a);
color:white;
}

header {
text-align:center;
font-size:36px;
padding:20px;
color:#00f0ff;
}

.search {
text-align:center;
margin:15px;
}

input {
padding:12px;
width:80%;
max-width:350px;
border-radius:10px;
border:none;
font-size:16px;
}

#products {
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:10px;
}

.card {
background:#111;
padding:15px;
border-radius:12px;
width:250px;
cursor:pointer;
box-shadow:0 0 15px #00f0ff33;
transition:0.3s;
}

.card:hover {
transform:scale(1.05);
}

.price {
color:#00f0ff;
font-weight:bold;
}

.in { color:#00ff90; }
.out { color:#ff4040; }

button {
padding:12px 20px;
border:none;
border-radius:10px;
background:#00f0ff;
cursor:pointer;
font-size:16px;
margin-top:10px;
}
</style>
</head>

<body>

<header>SiriusTech</header>

<div class="search">
<input placeholder="Поиск..." oninput="search(this.value)">
</div>

<div id="products"></div>

<script>

let data = [];

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTzzPZY3u78bCNtoJwAfRnDFKsLT2RiD5F4xxTx1Rn1Ycfx_XaY81ffIX5jGJEWoek5zc8MjX0SmjCx/pub?output=csv";

fetch(url)
.then(res => res.text())
.then(text => {

let rows = text.split("\n").slice(1);

rows.forEach(r => {

if(!r) return;

let cols = r.includes(";") ? r.split(";") : r.split(",");

let name = cols[0];
let price = cols[1];
let stock = cols[2];

if(!name) return;

data.push({
name: name.trim(),
price: Math.round((parseFloat(price) || 0) * 1.08),
stock: stock ? stock.trim() : "Есть"
});

});

render(data);

})
.catch(err=>{
document.getElementById("products").innerHTML = "Ошибка загрузки таблицы";
});

function render(list){

if(list.length === 0){
document.getElementById("products").innerHTML = "Нет товаров";
return;
}

let html = "";

list.forEach(item => {
html += `
<div class="card" onclick="openItem('${item.name.replace(/'/g,"")}')">
<div>${item.name}</div>
<div class="price">${item.price.toLocaleString()} ₽</div>
</div>`;
});

document.getElementById("products").innerHTML = html;
}

function search(q){
q = q.toLowerCase();
let filtered = data.filter(x => x.name.toLowerCase().includes(q));
render(filtered);
}

function openItem(name){

let item = data.find(x => x.name === name);

let statusClass = item.stock.toLowerCase().includes("нет") ? "out" : "in";

let text = encodeURIComponent(`Здравствуйте, хочу купить:\n${item.name}\nЦена: ${item.price}₽`);

document.getElementById("products").innerHTML = `
<button onclick="render(data)">⬅ Назад</button>

<h2 style="text-align:center">${item.name}</h2>

<p style="text-align:center; font-size:20px;">
<b>${item.price.toLocaleString()} ₽</b>
</p>

<p class="${statusClass}" style="text-align:center;">
${item.stock}
</p>

<div style="text-align:center;">
<a href="https://t.me/zawsedg?text=${text}" target="_blank">
<button>Купить</button>
</a>
</div>
`;
}

</script>

</body>
</html>
