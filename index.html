<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Price</title>
<style>
body { background:black; color:white; font-family:sans-serif; padding:20px; }
button { display:block; width:100%; margin:10px 0; padding:15px; font-size:18px; border:none; border-radius:10px; background:#222; color:white; cursor:pointer; }
.item { padding:10px; border-bottom:1px solid #444; }
</style>
</head>
<body>
<h2>Категории</h2>
<div id="menu"></div>
<div id="content"></div>

<script>
let data = []; // глобальная переменная
let currentCategory = null; // текущая категория

async function loadData() {
  try {
    const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTzzPZY3u78bCNtoJwAfRnDFKsLT2RiD5F4xxTx1Rn1Ycfx_XaY81ffIX5jGJEWoek5zc8MjX0SmjCx/pub?gid=0&single=true&output=csv");
    let text = await res.text();
    
    const rows = text.split(/\r?\n/).slice(1);
    const newData = [];
    rows.forEach(r => {
      if(!r) return;
      const cols = r.split(",");
      if(cols.length < 3) return;
      const category = cols[0].trim();
      const name = cols[1].trim();
      const price = parseFloat(cols[2].trim()) || 0; // используем parseFloat для дробных цен
      newData.push({ category, name, price });
    });

    data = newData;
    showMenu();
    if(currentCategory) openCat(currentCategory); // обновляем текущую категорию
  } catch(e) {
    console.error("Ошибка загрузки таблицы:", e);
  }
}

function showMenu() {
  const categories = [...new Set(data.map(x => x.category))];
  let html = "";
  categories.forEach(cat => {
    html += `<button onclick="openCat('${cat}')">${cat}</button>`;
  });
  document.getElementById("menu").innerHTML = html;
}

function openCat(cat) {
  currentCategory = cat;
  const items = data.filter(x => x.category === cat);
  let html = `<button onclick="back()">⬅ Назад</button>`;
  items.forEach(i => {
    const finalPrice = Math.round(i.price * 1.10); // прибавляем 10% и округляем до целого
    html += `<div class="item">${i.name} — ${finalPrice}р</div>`;
  });
  document.getElementById("content").innerHTML = html;
  document.getElementById("menu").style.display = "none";
}

function back() {
  currentCategory = null;
  document.getElementById("menu").style.display = "block";
  document.getElementById("content").innerHTML = "";
}

// Старт
loadData();

// Автообновление каждые 50 секунд
setInterval(loadData, 50000);
</script>

</body>
</html>
