<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Price</title>

<style>
body{
background:black;
color:white;
font-family:sans-serif;
padding:20px;
}
button{
display:block;
width:100%;
margin:10px 0;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#222;
color:white;
}
.item{
padding:10px;
border-bottom:1px solid #444;
}
</style>

</head>

<body>

<h2>Категории</h2>

<div id="menu"></div>
<div id="content"></div>

<script>

let data = [
{category:"СМАРТФОНЫ SAMSUNG", name:"Samsung Fold 7", price:115500},
{category:"СМАРТФОНЫ SAMSUNG", name:"Samsung S25 Ultra", price:83000},
{category:"СМАРТФОНЫ SAMSUNG", name:"Samsung A56", price:27000},

{category:"ЧАСЫ SAMSUNG", name:"Samsung Watch Ultra 8", price:25500},
{category:"ЧАСЫ SAMSUNG", name:"Samsung Fit3", price:3200},

{category:"НАУШНИКИ SAMSUNG", name:"Samsung Buds3 Pro", price:10500},

{category:"ПЛАНШЕТЫ SAMSUNG", name:"Samsung Tab S10 Plus", price:66500},

{category:"MACBOOK", name:"MacBook Pro 14", price:153500},

{category:"IPAD", name:"iPad Pro 13", price:103000},

{category:"APPLE WATCH", name:"Apple Watch Ultra 3", price:60500},

{category:"AIRPODS", name:"AirPods Pro 2", price:14500},

{category:"АКСЕССУАРЫ APPLE", name:"Magic Mouse 3", price:8500},

{category:"ДРУГИЕ СМАРТФОНЫ", name:"iPhone 17 Pro Max", price:121500},

{category:"ПЫЛЕСОСЫ", name:"Dyson V15", price:49000},

{category:"ИГРОВЫЕ КОНСОЛИ", name:"PS5 Slim", price:43500}
];

function showMenu(){
let categories = [...new Set(data.map(x=>x.category))];
let html = "";

categories.forEach(cat=>{
html += `<button onclick="openCat('${cat}')">${cat}</button>`;
});

document.getElementById("menu").innerHTML = html;
}

function openCat(cat){
let items = data.filter(x=>x.category==cat);
let html = `<button onclick="back()">⬅ Назад</button>`;

items.forEach(i=>{
html += `<div class="item">${i.name} — ${i.price}р</div>`;
});

document.getElementById("content").innerHTML = html;
document.getElementById("menu").style.display="none";
}

function back(){
document.getElementById("menu").style.display="block";
document.getElementById("content").innerHTML="";
}

showMenu();

</script>

</body>
</html>
