<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Категории</title>

<style>
body { background:#0f0f0f; color:white; font-family:Arial; padding:20px; }
button { width:100%; padding:15px; margin:5px 0; border:none; border-radius:10px; background:#1f1f1f; color:white; }
.item { background:#1a1a1a; padding:10px; margin:5px 0; border-radius:10px; }
.category { display:none; }
</style>
<script>
let data = [];

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTzzPZY3u78bCNtoJwAfRnDFKsLT2RiD5F4xxTx1Rn1Ycfx_XaY81ffIX5jGJEWoek5zc8MjX0SmjCxl/pub?output=csv
?gid=0&single=true")
.then(res => res.text())
.then(text => {

let rows = text.split("\n").slice(1);

rows.forEach(row => {

let cols = row.split(/,|;/);

if(cols.length >= 3){
data.push({
category: cols[0].trim(),
name: cols[1].trim(),
price: Math.round(parseFloat(cols[2]) * 1.10)
});
}

});

showMenu();
});

function showMenu(){
let categories = [...new Set(data.map(x=>x.category))];
let html = "";

categories.forEach(cat=>{
html += `<button onclick="openCat('${cat}')">${cat}</button>`;
});

document.getElementById("menu").innerHTML = html;
}

function openCat(cat){
let items = data.filter(x=>x.category==cat);
let html = `<button onclick="back()">⬅ Назад</button>`;

items.forEach(i=>{
html += `<div class="item">${i.name} — ${i.price}р</div>`;
});

document.getElementById("content").innerHTML = html;
document.getElementById("menu").style.display="none";
}

function back(){
document.getElementById("menu").style.display="block";
document.getElementById("content").innerHTML="";
}
</script>


</head>

<body>

<h1>Категории</h1>

<div id="menu"></div>
<div id="content"></div>

</body>
</html>
