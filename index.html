<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SiriusTech</title>

<style>
body {
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#0b0f1a,#1c1f2a);
color:#fff;
}

header {
text-align:center;
padding:30px;
font-size:42px;
font-weight:bold;
color:#00f0ff;
text-shadow:0 0 20px #00f0ff;
}

#searchBox {
display:block;
margin:20px auto;
padding:15px;
width:80%;
max-width:400px;
border-radius:10px;
border:none;
font-size:18px;
}

#content {
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.item {
background:#111;
padding:15px;
border-radius:12px;
width:260px;
cursor:pointer;
box-shadow:0 0 15px #00f0ff33;
transition:0.3s;
}

.item:hover {
transform:scale(1.05);
background:#00f0ff;
color:#000;
}

.price {
font-size:20px;
margin-top:10px;
}

.stock {
margin-top:5px;
font-size:14px;
}

.in { color:#00ff90; }
.out { color:#ff4040; }

button {
padding:15px;
border:none;
border-radius:10px;
background:#00f0ff;
color:#000;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<header>SiriusTech</header>

<input id="searchBox" placeholder="Поиск..." oninput="search()">

<div id="content">Загрузка...</div>

<script>

let data = [];

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTzzPZY3u78bCNtoJwAfRnDFKsLT2RiD5F4xxTx1Rn1Ycfx_XaY81ffIX5jGJEWoek5zc8MjX0SmjCx/pub?output=csv")
.then(res => res.text())
.then(text => {

let rows = text.split("\n");

rows.forEach(r => {

if(!r.trim()) return;

// 👉 ищем цену в конце строки
let match = r.match(/(\d+)\s*р?$/);

if(!match) return;

let price = parseInt(match[1]);

// 👉 наценка 8%
price = Math.round(price * 1.08);

// 👉 название = всё кроме цены
let name = r.replace(/(\d+)\s*р?$/, "").trim();

data.push({
name: name,
price: price,
stock: "В наличии"
});

});

render(data);

});

function render(list){
if(list.length === 0){
document.getElementById("content").innerHTML = "Нет товаров";
return;
}

let html = "";

list.forEach((item, i) => {
html += `
<div class="item" onclick="openItem(${i})">
<b>${item.name}</b>
<div class="price">${item.price} ₽</div>
</div>
`;
});

document.getElementById("content").innerHTML = html;
}

function search(){
let q = document.getElementById("searchBox").value.toLowerCase();

let filtered = data.filter(x =>
x.name.toLowerCase().includes(q)
);

render(filtered);
}

function openItem(i){
let item = data[i];

document.getElementById("content").innerHTML = `
<button onclick="render(data)">⬅ Назад</button>

<h2>${item.name}</h2>
<p>Цена: ${item.price} ₽</p>

<a href="https://t.me/mismailz" target="_blank">
<button>Купить</button>
</a>
`;
}

</script>

</body>
</html>
