<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SiriusTech</title>

<style>
body {
margin:0;
font-family: Arial;
background: linear-gradient(135deg,#0f172a,#020617);
color:white;
}

header {
text-align:center;
font-size:45px;
padding:30px;
color:#00eaff;
font-weight:bold;
text-shadow:0 0 25px #00eaff;
}

#search {
display:block;
margin:20px auto;
padding:15px;
width:80%;
max-width:400px;
border-radius:12px;
border:none;
font-size:18px;
}

#content {
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.item {
background:#111;
padding:15px;
border-radius:12px;
width:260px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px #00eaff33;
}

.item:hover {
background:#00eaff;
color:black;
transform:scale(1.05);
}

.price {
font-size:20px;
margin-top:10px;
}

button {
padding:15px;
border:none;
border-radius:10px;
background:#00eaff;
color:black;
font-size:18px;
cursor:pointer;
margin-top:20px;
}
</style>

</head>

<body>

<header>SiriusTech</header>

<input id="search" placeholder="Поиск..." oninput="search()">

<div id="content">Загрузка...</div>

<script>

let data = [];

// 🔥 твой прайс
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSc6Bb-JQJbu7NjqJxbxGRCj_z_AVdLukChAzOo94FuflV8l2kSMpAg96xDO2T7BebWUYdpH8MbvZZS/pub?gid=1055551571&single=true&output=csv")
.then(res => res.text())
.then(text => {

// чистим мусор
text = text.replace(/"/g,"").replace(/\r/g,"");

let rows = text.split("\n");

rows.forEach(r => {

if(!r.trim()) return;

// ищем цену
let priceMatch = r.match(/(\d{3,6})\s*р?/);

if(!priceMatch) return;

let price = parseInt(priceMatch[1]);

// наценка 8%
price = Math.round(price * 1.08);

// название
let name = r.replace(priceMatch[0], "").trim();

// чистка
name = name.replace(/,+/g," ");

data.push({name, price});

});

render(data);

})
.catch(() => {
document.getElementById("content").innerHTML = "Ошибка загрузки прайса";
});

// вывод
function render(list){

if(list.length === 0){
document.getElementById("content").innerHTML = "Нет товаров";
return;
}

let html = "";

list.forEach((item,i) => {
html += `
<div class="item" onclick="openItem(${i})">
<b>${item.name}</b>
<div class="price">${item.price} ₽</div>
</div>
`;
});

document.getElementById("content").innerHTML = html;
}

// поиск
function search(){
let q = document.getElementById("search").value.toLowerCase();

let filtered = data.filter(x =>
x.name.toLowerCase().includes(q)
);

render(filtered);
}

// карточка
function openItem(i){
let item = data[i];

document.getElementById("content").innerHTML = `
<button onclick="render(data)">⬅ Назад</button>

<h2>${item.name}</h2>
<p>Цена: ${item.price} ₽</p>

<a href="https://t.me/mismailz" target="_blank">
<button>Купить</button>
</a>
`;
}

</script>

</body>
</html>
