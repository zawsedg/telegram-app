<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Price</title>

<style>
body{
background:black;
color:white;
font-family:sans-serif;
padding:20px;
}
button{
display:block;
width:100%;
margin:10px 0;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#222;
color:white;
}
.item{
padding:10px;
border-bottom:1px solid #444;
}
</style>

</head>

<body>

<h2>Категории</h2>

<div id="menu"></div>
<div id="content"></div>
<script>

let data = [];

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTzzPZY3u78bCNtoJwAfRnDFKsLT2RiD5F4xxTx1Rn1Ycfx_XaY81ffIX5jGJEWoek5zc8MjX0SmjCx/pub?gid=0&single=true&output=csv")
.then(res => res.text())
.then(text => {
let rows = text.split("\n").slice(1);

rows.forEach(r=>{
let [category, name, price] = r.split(",");
data.push({
category: category,
name: name,
price: parseInt(price)
});
});

});
function showMenu(){
let categories = [...new Set(data.map(x=>x.category))];
let html = "";

categories.forEach(cat=>{
html += `<button onclick="openCat('${cat}')">${cat}</button>`;
});

document.getElementById("menu").innerHTML = html;
}

function openCat(cat){
let items = data.filter(x=>x.category==cat);
let html = `<button onclick="back()">⬅ Назад</button>`;

items.forEach(i=>{
let finalPrice = i.price + 5000;
html += `<div class="item">${i.name} — ${finalPrice}р</div>`;
});

document.getElementById("content").innerHTML = html;
document.getElementById("menu").style.display="none";
}

function back(){
document.getElementById("menu").style.display="block";
document.getElementById("content").innerHTML="";
}

showMenu();

</script>

</body>
</html>
